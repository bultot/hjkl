# sample tmux config for tests

# rebind the prefix to Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# windows
bind c new-window -c "#{pane_current_path}"

# splits with mnemonic keys
bind | split-window -h
bind - split-window -v

# no-prefix pane navigation (root table)
bind -n M-h select-pane -L
bind -n M-l select-pane -R

# reload config
bind r source-file ~/.config/tmux/tmux.conf

# copy-mode binding lives in another table and must be ignored
bind -T copy-mode-vi v send-keys -X begin-selection
